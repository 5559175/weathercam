<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Live Weather Cam</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #0f172a;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center; 
            min-height: 100vh;
            padding: 15px 10px 15px 10px;
            overflow: auto; /* Standard window scrollbars appear naturally when zooming */
        }

        img {
            display: block;
            /* No max-height boundaries! This allows Ctrl + Wheel zooming to expand the image naturally */
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
            border-radius: 0;
        }
    </style>
</head>
<body>

    <img id="weather-cam" alt="Live Weather Snapshot">

    <script>
        const camImage = document.getElementById('weather-cam');

        // 1. Force the browser to discard cached images on page refresh
        const uniqueTimestamp = new Date().getTime();
        camImage.src = 'current.jpg?t=' + uniqueTimestamp;

        // 2. Intelligent Scaling Setup (Runs Once on Page Load)
        camImage.onload = function() {
            // Check the available height of the user's browser window, accounting for our 30px padding
            const availableHeight = window.innerHeight - 30;
            
            // Calculate what percentage of the screen height the 4K image needs to scale to to fit perfectly
            const scalePercentage = (availableHeight / 2160) * 100;

            if (scalePercentage < 100) {
                // Shrink the image to fit your screen initially using a fluid style percentage
                this.style.width = (3840 * (scalePercentage / 100)) + 'px';
                this.style.height = 'auto';
            } else {
                // If the monitor is larger than 4K, display it at raw size
                this.style.width = '3840px';
                this.style.height = '2160px';
            }
        };
    </script>

</body>
</html>
