<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Live Weather Cam</title>
    
    <meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="pragma" content="no-cache">
    <meta http-equiv="expires" content="0">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #0f172a;
            padding: 15px 10px;
            text-align: center;
            font-family: sans-serif;
        }
        img {
            max-width: 100%;
            max-height: calc(100vh - 80px);
            object-fit: contain;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }
        .banner {
            margin-top: 15px;
            color: #cbd5e1;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>
    <img id="weathercam" alt="Live Weather Snapshot">
    <div class="banner">Temp: 17.0°C  |  Humidity: 91%  |  Wind: 0.00 mph  |  Rain: 0.0 mm/hr  |  Daily Rain: 0.0 mm</div>

    <script>
        // Shatter mobile cache engines by appending a live unique runtime timestamp 
        document.getElementById('weathercam').src = 'current.jpg?t=' + new Date().getTime();
    </script>
</body>
</html>
