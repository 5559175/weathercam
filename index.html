<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Live Weather Cam</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #0f172a;
            padding: 15px 10px;
            text-align: center;
            font-family: sans-serif;
        }
        img {
            max-width: 100%;
            max-height: calc(100vh - 40px);
            object-fit: contain;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }
    </style>
</head>
<body>
    <img id="weathercam" alt="Live Weather Snapshot">

    <script>
        // Force a unique timestamp query parameter onto the image URL on page load
        // This instantly shatters aggressive mobile browser caches
        document.getElementById('weathercam').src = 'current.jpg?t=' + new Date().getTime();
    </script>
</body>
</html>
