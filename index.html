<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Live Weather Cam</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #0f172a;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center; /* Centers the image horizontally on wide desktop monitors */
            min-height: 100vh;
            /* Account for the 15px top padding in our viewport calculations */
            padding: 15px 10px 15px 10px;
            overflow: hidden; /* Guarantees no scrollbars can ever appear on the window */
        }
        img {
            display: block;
            width: auto;
            height: auto;
            /* Adaptive constraints: Fit fluidly on phones, cap height on desktops */
            max-width: 100%;
            max-height: calc(100vh - 30px); /* Adjusts for top and bottom padding */
            object-fit: contain;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
        }
    </style>
</head>
<body>

    <img id="weather-cam" alt="Live Weather Snapshot">

    <script>
        // Forces the browser to discard cached images on every page refresh
        const camImage = document.getElementById('weather-cam');
        const uniqueTimestamp = new Date().getTime();
        camImage.src = 'current.jpg?t=' + uniqueTimestamp;
    </script>

</body>
</html>
