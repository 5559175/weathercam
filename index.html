<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Live Weather Cam</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #0f172a;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center; 
            min-height: 100vh;
            /* Exactly 15px spacing from the top browser edge */
            padding: 15px 10px 15px 10px;
            overflow: auto; /* Scrollbars appear cleanly when you zoom in */
        }

        /* The Frame Container restricts initial layout heights without locking the actual image element */
        .cam-frame {
            width: 100%;
            /* 16:9 aspect ratio prevents the image from creating vertical scrollbars on load */
            max-width: calc((100vh - 30px) * (16 / 9)); 
        }

        img {
            display: block;
            width: 100%;
            height: auto;
            border-radius: 0; /* Sharp, square edges */
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
        }
    </style>
</head>
<body>

    <div class="cam-frame">
        <img id="weather-cam" alt="Live Weather Snapshot">
    </div>

    <script>
        // Forces Chrome to drop the old cached image every time the page refreshes
        const camImage = document.getElementById('weather-cam');
        const uniqueTimestamp = new Date().getTime();
        camImage.src = 'current.jpg?t=' + uniqueTimestamp;
    </script>

</body>
</html>
