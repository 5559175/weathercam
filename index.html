<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Live Weather Cam</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #0f172a;
            /* Explicit directional padding prevents Chrome from crunching the layout */
            padding-top: 15px;
            padding-left: 10px;
            padding-right: 10px;
            padding-bottom: 15px;
            
            /* Align things to the top center cleanly */
            text-align: center;
        }

        .cam-wrapper {
            display: inline-block;
            /* Uses percentage width based on a 16:9 4K widescreen aspect ratio.
               By avoiding strict vh/vw caps, Chrome can scale this area smoothly up to 500%. */
            width: 96%;
            max-width: 1700px; /* Safe bounds for giant desktop screens */
            margin: 0 auto;
        }

        img {
            display: block;
            width: 100%;
            height: auto;
            border-radius: 0; /* Square edges */
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
        }
    </style>
</head>
<body>

    <div class="cam-wrapper">
        <img id="weather-cam" alt="Live Weather Snapshot">
    </div>

    <script>
        // Forces Chrome to bypass its cache on every page refresh
        const camImage = document.getElementById('weather-cam');
        const uniqueTimestamp = new Date().getTime();
        camImage.src = 'current.jpg?t=' + uniqueTimestamp;
    </script>

</body>
</html>
