<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Live Weather Cam</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #0f172a;
            /* No flexbox centering! This prevents Chrome from crushing the image layout at 500% zoom */
            padding-top: 15px;
            padding-left: 10px;
            padding-right: 10px;
            overflow: auto;
        }

        img {
            display: block;
            /* Centers the block element using standard page margins instead of a flex grid */
            margin-left: auto;
            margin-right: auto;
            
            /* Initial fit: Scales to fit your screen width on load */
            width: 100%;
            height: auto;
            
            /* Limits the width so it doesn't spill over your monitor's height on initial load */
            max-width: calc((100vh - 30px) * (16 / 9));
            
            border-radius: 0;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
        }
    </style>
</head>
<body>

    <img id="weather-cam" alt="Live Weather Snapshot">

    <script>
        // Forces Chrome to bypass its cache on every page refresh
        const camImage = document.getElementById('weather-cam');
        const uniqueTimestamp = new Date().getTime();
        camImage.src = 'current.jpg?t=' + uniqueTimestamp;
    </script>

</body>
</html>
