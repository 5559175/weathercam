<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Live Weather Cam</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #0f172a;
            display: flex;
            flex-direction: column;
            justify-content: flex-start; /* Aligns content to the very top */
            min-height: 100vh;
            /* Add a 15px safe space at the top, and 10px on the sides for a clean frame look */
            padding: 15px 10px 0 10px;
        }
        img {
            width: 100%;
            height: auto; /* Scales down fluidly based on your screen's width */
            display: block;
        }
    </style>
</head>
<body>
    <img src="current.jpg" alt="Live Weather Snapshot">
</body>
</html>
