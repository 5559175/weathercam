<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Live Weather Cam</title>
    <style>
        /* Force the core browser tags to snap to the exact available window height */
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #0f172a;
        }

        body {
            /* Create structural padding without dynamic viewport calculations */
            padding: 15px 10px 15px 10px;
            box-sizing: border-box;
            
            /* Center the layout container */
            display: block;
            text-align: center;
            overflow: auto; /* Allow natural page panning when zoomed */
        }

        .cam-container {
            display: inline-block;
            margin: 0 auto;
            
            /* Fit to screen perfectly at 100% load: 
               Forces the wrapper box to be exactly as high as the browser window, 
               minus our 30px top/bottom padding constraints. */
            height: calc(100% - 30px);
            
            /* Maintains the exact 16:9 native widescreen camera aspect ratio layout */
            aspect-ratio: 16 / 9;
        }

        img {
            display: block;
            /* Fills the container box completely with zero layout math */
            width: 100%;
            height: 100%;
            object-fit: contain;
            
            border-radius: 0;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
        }
    </style>
</head>
<body>

    <div class="cam-container">
        <img id="weather-cam" alt="Live Weather Snapshot">
    </div>

    <script>
        // Forces Chrome to drop the old cached image every time the page refreshes
        const camImage = document.getElementById('weather-cam');
        const uniqueTimestamp = new Date().getTime();
        camImage.src = 'current.jpg?t=' + uniqueTimestamp;
    </script>

</body>
</html>
