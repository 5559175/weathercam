<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Live Weather Cam</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #0f172a;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            min-height: 100vh;
            padding: 15px 10px 15px 10px;
            /* Allow standard browser scrollbars when image overflows screen boundaries */
            overflow: auto; 
        }

        img {
            display: block;
            width: auto;
            height: auto;
            border-radius: 0;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
            
            /* Initial clean fit-to-screen settings */
            max-width: 100%;
            max-height: calc(100vh - 30px);
            object-fit: contain;
            
            /* Show a magnifying glass pointer to indicate it can be clicked */
            cursor: zoom-in;
            transition: max-width 0.1s ease, max-height 0.1s ease;
        }

        /* This special class is activated via JavaScript on click */
        img.full-size {
            max-width: none !important;
            max-height: none !important;
            width: 3840px !important;  /* Force the raw, literal 4K asset scale */
            height: 2160px !important;
            cursor: zoom-out; /* Changes cursor to a zoom-out glass */
        }
    </style>
</head>
<body>

    <img id="weather-cam" alt="Live Weather Snapshot">

    <script>
        const camImage = document.getElementById('weather-cam');
        
        // 1. Force the browser to discard cached images on page refresh
        const uniqueTimestamp = new Date().getTime();
        camImage.src = 'current.jpg?t=' + uniqueTimestamp;

        // 2. Desktop Click-to-Zoom Handler
        camImage.addEventListener('click', function() {
            // Toggles the .full-size class on and off with each normal mouse click
            this.classList.toggle('full-size');
        });
    </script>

</body>
</html>
