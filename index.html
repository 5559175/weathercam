<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Live Weather Cam</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #0f172a;
            /* Explicit padding settings keep our top spacing intact */
            padding-top: 15px;
            padding-left: 10px;
            padding-right: 10px;
            padding-bottom: 15px;
            
            /* Center the layout block without using bug-prone flexboxes */
            text-align: center;
        }

        .cam-wrapper {
            display: inline-block;
            margin: 0 auto;

            /* UNIVERSAL SCALE: Pick whichever value is smaller at 100% zoom:
               1. 95% of the total screen width (perfect for mobile and regular screens)
               2. The exact width required to fit your monitor height at 16:9 (perfect for your ultra-wide) */
            width: min(95vw, calc((100vh - 30px) * (16 / 9)));
        }

        img {
            display: block;
            width: 100%;
            height: auto;
            border-radius: 0; /* Square edges */
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
        }
    </style>
</head>
<body>

    <div class="cam-wrapper">
        <img id="weather-cam" alt="Live Weather Snapshot">
    </div>

    <script>
        // Forces Chrome to drop the old cached image every time the page refreshes
        const camImage = document.getElementById('weather-cam');
        const uniqueTimestamp = new Date().getTime();
        camImage.src = 'current.jpg?t=' + uniqueTimestamp;
    </script>

</body>
</html>
